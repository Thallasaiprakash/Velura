name: Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 🏗 Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🏗 Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 ndk;26.1.10909125'

      - name: 🏗 Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EAS_TOKEN || secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: npm ci || npm install

      - name: 🔍 Validate native plugin
        run: node -e "require('./plugins/android-unlock-plugin.js'); console.log('Plugin loaded OK')"

      - name: 🔧 Generate Android project (Prebuild)
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_PUBLIC_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: 🚀 Build APK with Gradle
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon -Dorg.gradle.jvmargs="-Xmx4g" 2>&1 | tail -100

      - name: 📦 Collect APK
        run: |
          echo "=== Searching for APK ==="
          find android/app/build/outputs -name "*.apk" -type f 2>/dev/null
          
          APK=$(find android/app/build/outputs -name "*.apk" -type f | head -1)
          if [ -n "$APK" ]; then
            cp "$APK" ./Velura.apk
            echo "✅ APK collected: $(ls -lh Velura.apk | awk '{print $5}')"
          else
            echo "❌ No APK found in outputs"
            find android -name "*.apk" -type f 2>/dev/null || echo "No APK anywhere in android/"
            exit 1
          fi

      - name: 📤 Upload Velura APK
        uses: actions/upload-artifact@v4
        with:
          name: Velura-APK-Download
          path: Velura.apk

      - name: 📤 Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-failure-logs
          path: |
            android/app/build/reports/
            android/app/build/outputs/logs/
          if-no-files-found: ignore
