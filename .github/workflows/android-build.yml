name: Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 🏗 Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🏗 Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 ndk;26.1.10909125'

      - name: 🏗 Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EAS_TOKEN || secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: npm ci || npm install

      - name: 🔍 Validate native plugin
        run: node -e "require('./plugins/android-unlock-plugin.js'); console.log('Plugin loaded OK')"

      - name: 🔧 Generate Android project (Prebuild)
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_PUBLIC_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: 🔧 Enable JS bundling for debug builds
        run: |
          # By default, debug builds skip JS bundling (expecting Metro server).
          # Set debuggableVariants to empty so ALL builds bundle JS into the APK.
          sed -i 's|// debuggableVariants = \["liteDebug", "prodDebug"\]|debuggableVariants = []|' android/app/build.gradle
          echo "✅ Patched build.gradle - debuggableVariants set to empty"
          grep -n "debuggableVariants" android/app/build.gradle

      - name: 🚀 Build Debug APK (with JS bundled)
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx4g" 2>&1 | tail -50
          echo ""
          echo "=== Build complete ==="

      - name: 📦 Collect APK
        run: |
          echo "=== APK files ==="
          find android -name "*.apk" -type f | grep -v intermediates
          echo ""
          APK=$(find android/app/build/outputs -name "*.apk" -type f 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            APK=$(find android -name "*.apk" -type f 2>/dev/null | grep -v intermediates | head -1)
          fi
          if [ -n "$APK" ]; then
            cp "$APK" ./Velura.apk
            echo "✅ APK: $(ls -lh Velura.apk)"
          else
            echo "❌ No APK found"
            exit 1
          fi

      - name: 📤 Upload Velura APK
        uses: actions/upload-artifact@v4
        with:
          name: Velura-APK-Download
          path: Velura.apk

      - name: 📤 Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-failure-logs
          path: |
            android/app/build/reports/
          if-no-files-found: ignore
