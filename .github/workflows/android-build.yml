name: Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 🏗 Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🏗 Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 ndk;26.1.10909125'

      - name: 🏗 Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EAS_TOKEN || secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: npm ci || npm install

      - name: 🔍 Validate native plugin
        run: node -e "require('./plugins/android-unlock-plugin.js'); console.log('Plugin loaded OK')"

      - name: 🚀 Build Android APK
        run: |
          export JAVA_OPTS="-Xmx4g"
          export GRADLE_OPTS="-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false -Dorg.gradle.parallel=false"

          # Record timestamp before build so we can find new APK files
          touch /tmp/build_start_marker

          # Run the build and capture full output
          eas build --platform android --profile preview --local --non-interactive 2>&1 | tee build_output.log
          BUILD_EXIT=$?

          echo "========================================="
          echo "Build exit code: $BUILD_EXIT"
          echo "========================================="

          # Strategy 1: Parse APK path from eas output (eas prints it on the last line)
          EAS_APK_PATH=$(grep -oE '/[^ ]+\.apk' build_output.log | tail -1)
          echo "EAS reported APK path: $EAS_APK_PATH"

          if [ -n "$EAS_APK_PATH" ] && [ -f "$EAS_APK_PATH" ]; then
            echo "✅ Found APK from EAS output: $EAS_APK_PATH"
            cp "$EAS_APK_PATH" ./Velura.apk
          else
            echo "Strategy 1 failed. Trying full filesystem search..."

            # Strategy 2: Search entire filesystem for APK files created after build started
            FOUND_APK=$(find / -name "*.apk" -newer /tmp/build_start_marker -type f 2>/dev/null | grep -v node_modules | head -1)
            echo "Found APK via filesystem search: $FOUND_APK"

            if [ -n "$FOUND_APK" ] && [ -f "$FOUND_APK" ]; then
              echo "✅ Found APK from filesystem search: $FOUND_APK"
              cp "$FOUND_APK" ./Velura.apk
            else
              echo "Strategy 2 failed. Trying broad search..."

              # Strategy 3: Find ANY apk file anywhere
              echo "=== ALL APK files on system ==="
              find / -name "*.apk" -type f 2>/dev/null | grep -v node_modules || echo "No APK files found anywhere"

              echo "=== ALL AAB files on system ==="
              find / -name "*.aab" -type f 2>/dev/null | grep -v node_modules || echo "No AAB files found anywhere"

              echo "=== Files in current directory ==="
              ls -la *.apk *.aab 2>/dev/null || echo "No apk/aab in current directory"

              echo "=== Last 50 lines of build output ==="
              tail -50 build_output.log
            fi
          fi

          # Final verification
          if [ -f "./Velura.apk" ]; then
            echo "========================================="
            echo "✅ SUCCESS: Velura.apk is ready!"
            ls -lh ./Velura.apk
            echo "========================================="
          else
            echo "========================================="
            echo "❌ FAILED: Could not locate APK file"
            echo "========================================="
            exit 1
          fi
        env:
          EXPO_TOKEN: ${{ secrets.EAS_TOKEN || secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: 📤 Upload Velura APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Velura-APK-Download
          path: Velura.apk

      - name: 📤 Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build_output.log
          if-no-files-found: ignore
