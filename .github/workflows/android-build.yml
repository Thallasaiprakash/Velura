name: Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@v4

      - name: 🧹 Cleanup disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 🏗 Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'ndk;26.1.10909125'

      - name: 🏗 Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🏗 Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EAS_TOKEN || secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: npm install

      - name: 🛠 Verify Google Services
        run: |
          if [ ! -f "google-services.json" ]; then
            echo "Warning: google-services.json missing, creating dummy for build phase"
            echo '{"project_info":{"project_number":"123","project_id":"dummy"},"client":[{"client_info":{"mobilesdk_app_id":"1:123:android:abc"},"api_key":[{"current_key":"dummy"}]}]}' > google-services.json
          fi

      - name: 🏗 Expo Prebuild (Verify Plugins)
        run: npx expo prebuild --platform android --no-install
        env:
          EXPO_TOKEN: ${{ secrets.EAS_TOKEN || secrets.EXPO_TOKEN }}

      - name: 🚀 Build Android APK (Local)
        run: |
          export JAVA_OPTS="-Xmx4096m -XX:MaxMetaspaceSize=1024m"
          export GRADLE_OPTS="-Dorg.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dorg.gradle.daemon=false -Dorg.gradle.parallel=false"
          eas build --platform android --profile preview --local --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EAS_TOKEN || secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: 📤 Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: velura-preview-apk
          path: |
            *.apk
            android/app/build/outputs/apk/preview/*.apk

      - name: 📤 Upload Build Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            android/app/build/logs
            android/build/logs
            *.log
