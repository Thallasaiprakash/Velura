name: Android Build
on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # Allows manual triggering

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: 🧹 Cleanup disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          # DO NOT remove $AGENT_TOOLSDIRECTORY as it contains Node/Java/Android SDK tools

      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: ☕ Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🏗 Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'ndk;26.1.10909125'

      - name: 🏗 Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EAS_TOKEN }}

      - name: 📦 Install dependencies
        run: npm ci || npm install

      - name: 🛠 Build APK (EAS Local)
        env:
          EXPO_TOKEN: ${{ secrets.EAS_TOKEN }}
          EXPO_PUBLIC_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EAS_NO_VCS: 1
        run: |
          npx eas-cli build --platform android --profile preview --local --non-interactive
          # Automatically find and rename the apk for easier download
          find . -maxdepth 1 -name "*.apk" -exec mv {} build.apk \;

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: velura-android-release
          path: build.apk
          if-no-files-found: error
          retention-days: 7
