name: Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 🏗 Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🏗 Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 ndk;26.1.10909125'

      - name: 🏗 Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EAS_TOKEN || secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: npm ci || npm install

      - name: 🔍 Validate native plugin
        run: node -e "require('./plugins/android-unlock-plugin.js'); console.log('Plugin loaded OK')"

      - name: 🚀 Build Android APK (Local CI)
        id: build_step
        run: |
          export JAVA_OPTS="-Xmx4g"
          export GRADLE_OPTS="-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false -Dorg.gradle.parallel=false"
          
          # Run eas build and capture output
          eas build --platform android --profile preview --local --non-interactive --output ./velura-app.apk 2>&1 | tee build_output.log
          
          # Verify the APK was created
          if [ -f "./velura-app.apk" ]; then
            echo "✅ APK created successfully at ./velura-app.apk"
            ls -lh ./velura-app.apk
            echo "apk_path=./velura-app.apk" >> $GITHUB_OUTPUT
          else
            echo "⚠️ APK not at expected path, searching..."
            # Fallback: search everywhere
            APK_PATH=$(find / -name "*.apk" -type f -newer build_output.log 2>/dev/null | head -1)
            if [ -n "$APK_PATH" ]; then
              echo "Found APK at: $APK_PATH"
              cp "$APK_PATH" ./velura-app.apk
              echo "apk_path=./velura-app.apk" >> $GITHUB_OUTPUT
            else
              echo "❌ No APK found anywhere"
              # Also check build log for the output path
              echo "=== Last 20 lines of build output ==="
              tail -20 build_output.log
            fi
          fi
        env:
          EXPO_TOKEN: ${{ secrets.EAS_TOKEN || secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: 📤 Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Velura-APK
          path: velura-app.apk
          if-no-files-found: warn

      - name: 📋 Print Build Error Details
        if: failure()
        run: |
          echo "=== FULL BUILD OUTPUT (last 200 lines) ==="
          tail -n 200 build_output.log || true
          echo ""
          echo "=== JAVA ERRORS ==="
          grep -i "error:" build_output.log || true
          grep -i "cannot find symbol" build_output.log || true
          grep -i "FAILURE:" build_output.log || true

      - name: 📤 Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build_output.log
          if-no-files-found: ignore
