name: Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 🏗 Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🏗 Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 ndk;26.1.10909125'

      - name: 🏗 Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EAS_TOKEN || secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: npm ci || npm install

      - name: 🔍 Validate native plugin
        run: node -e "require('./plugins/android-unlock-plugin.js'); console.log('Plugin loaded OK')"

      - name: 🔧 Generate Android project (Prebuild)
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_PUBLIC_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: 🔐 Generate debug keystore for signing
        run: |
          keytool -genkeypair -v \
            -keystore android/app/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"
          echo "✅ Debug keystore created"
          ls -la android/app/debug.keystore

      - name: 🚀 Build Release APK with Gradle
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon -Dorg.gradle.jvmargs="-Xmx4g" --stacktrace 2>&1 | tee build.log | tail -80
          echo ""
          echo "=== Build finished ==="
          echo "=== APK files produced ==="
          find . -name "*.apk" -type f | grep -v intermediates || echo "No APK found in android/"

      - name: 📦 Collect APK
        run: |
          echo "=== Full search for APK files ==="
          find . -name "*.apk" -type f 2>/dev/null | grep -v intermediates | grep -v node_modules

          echo ""
          echo "=== Contents of build outputs ==="
          ls -laR android/app/build/outputs/ 2>/dev/null || echo "No outputs directory"

          echo ""
          APK=$(find android/app/build/outputs -name "*.apk" -type f 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            APK=$(find . -name "*.apk" -type f 2>/dev/null | grep -v intermediates | grep -v node_modules | head -1)
          fi

          if [ -n "$APK" ]; then
            echo "✅ Found: $APK"
            cp "$APK" ./Velura.apk
            ls -lh Velura.apk
          else
            echo "❌ No APK found"
            echo "=== Last 50 lines of build log ==="
            tail -50 android/build.log 2>/dev/null || true
            exit 1
          fi

      - name: 📤 Upload Velura APK
        uses: actions/upload-artifact@v4
        with:
          name: Velura-APK-Download
          path: Velura.apk

      - name: 📤 Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-failure-logs
          path: |
            android/build.log
            android/app/build/reports/
          if-no-files-found: ignore
