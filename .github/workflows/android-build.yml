name: Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 🏗 Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🏗 Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 ndk;26.1.10909125'

      - name: 🏗 Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EAS_TOKEN || secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: npm ci || npm install

      - name: 🔍 Validate native plugin
        run: node -e "require('./plugins/android-unlock-plugin.js'); console.log('Plugin loaded OK')"

      - name: 🚀 Build Android APK
        run: |
          export JAVA_OPTS="-Xmx4g"
          export GRADLE_OPTS="-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false -Dorg.gradle.parallel=false"
          
          # Set output directory for local EAS build
          mkdir -p ./build-output
          export EAS_LOCAL_BUILD_ARTIFACTS_DIR=./build-output
          
          eas build --platform android --profile preview --local --non-interactive 2>&1 | tee build_output.log
          
          echo ""
          echo "=== Build output directory contents ==="
          ls -la ./build-output/ || true
          
          # Find and rename the APK for easy download
          APK_FILE=$(find ./build-output -name "*.apk" -type f | head -1)
          if [ -n "$APK_FILE" ]; then
            cp "$APK_FILE" ./Velura.apk
            echo "✅ APK ready: Velura.apk ($(du -h ./Velura.apk | cut -f1))"
          else
            echo "⚠️ No APK in build-output, searching project root..."
            APK_FILE=$(find . -maxdepth 1 -name "*.apk" -type f | head -1)
            if [ -n "$APK_FILE" ]; then
              cp "$APK_FILE" ./Velura.apk
              echo "✅ APK found in root: Velura.apk"
            else
              echo "❌ No APK found. Last 30 lines of build output:"
              tail -30 build_output.log
            fi
          fi
        env:
          EXPO_TOKEN: ${{ secrets.EAS_TOKEN || secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: 📤 Upload Velura APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Velura-APK
          path: |
            Velura.apk
            build-output/*.apk
          if-no-files-found: warn

      - name: 📋 Print Build Error Details
        if: failure()
        run: |
          echo "=== BUILD OUTPUT (last 200 lines) ==="
          tail -n 200 build_output.log || true
          echo ""
          echo "=== JAVA ERRORS ==="
          grep -i "error:" build_output.log || true
          grep -i "cannot find symbol" build_output.log || true

      - name: 📤 Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build_output.log
          if-no-files-found: ignore
