name: Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 🏗 Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🏗 Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 ndk;26.1.10909125'

      - name: 🏗 Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EAS_TOKEN || secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: npm ci || npm install

      - name: 🔍 Validate native plugin
        run: node -e "require('./plugins/android-unlock-plugin.js'); console.log('Plugin loaded OK')"

      - name: 🚀 Build Android APK (Local CI)
        run: |
          export JAVA_OPTS="-Xmx4g"
          export GRADLE_OPTS="-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false -Dorg.gradle.parallel=false"
          
          eas build --platform android --profile preview --local --non-interactive 2>&1 | tee build_output.log
        env:
          EXPO_TOKEN: ${{ secrets.EAS_TOKEN || secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: 📦 Find and collect APK
        if: success()
        run: |
          echo "=== Searching for APK files ==="
          find . /tmp -name "*.apk" -type f 2>/dev/null | head -20
          # Copy any APK found to workspace root
          find . /tmp -name "*.apk" -type f -exec cp {} ./velura-build.apk \; 2>/dev/null || true
          ls -la *.apk 2>/dev/null || echo "No APK found in root"

      - name: 📤 Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Velura-Build
          path: |
            velura-build.apk
            *.apk
          if-no-files-found: warn

      - name: 📋 Print Build Error Details
        if: failure()
        run: |
          echo "========================================="
          echo "=== FULL BUILD OUTPUT (last 200 lines) ==="
          echo "========================================="
          tail -n 200 build_output.log || true
          
          echo ""
          echo "========================================="
          echo "=== SEARCHING FOR JAVA ERRORS ==="
          echo "========================================="
          grep -i "error:" build_output.log || true
          grep -i "cannot find symbol" build_output.log || true
          grep -i "FAILURE:" build_output.log || true
          
          echo ""
          echo "========================================="
          echo "=== GENERATED JAVA FILES ==="
          echo "========================================="
          find /tmp -path "*/com/saiprakash77/velura/*.java" -exec echo "--- {} ---" \; -exec cat {} \; 2>/dev/null || true
          find . -path "*/com/saiprakash77/velura/*.java" -exec echo "--- {} ---" \; -exec cat {} \; 2>/dev/null || true

      - name: 📤 Upload All Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build_output.log
            *.apk
          if-no-files-found: ignore
