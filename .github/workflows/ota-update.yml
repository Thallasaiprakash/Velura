name: Automatic OTA Update
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  update:
    name: Publish OTA Update
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 🏗 Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EAS_TOKEN }}

      - name: 📦 Install dependencies
        run: npm install

      - name: 🚀 Publish Update
        run: npx eas-cli update --branch production --message "${{ github.event.head_commit.message }}" --non-interactive
